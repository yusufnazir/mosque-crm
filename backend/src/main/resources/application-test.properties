# ─── Test Profile ───────────────────────────────────────────────────────────────
# Activate with:  mvn spring-boot:run -Dspring-boot.run.profiles=test
# Or use the convenience script from the repo root:  .\start-test-backend.ps1
#
# One-time local database setup (needs MariaDB root):
#   mysql -u root -p -P 3307 --protocol=TCP < scripts\create-test-db.sql
#
# Differences from the default (dev) profile:
#  - Separate database:  mcrm-test   (never touches your dev data)
#  - Liquibase drop-first: true       (schema + seed data is rebuilt on every start)
#  - Different port: 8201             (dev and test backends can run simultaneously)
#  - Less SQL noise:  show-sql=false

# DataSource — dedicated test database
spring.datasource.url=jdbc:mariadb://localhost:3307/mcrm-test?createDatabaseIfNotExist=true&useSSL=false&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&nullCatalogMeansCurrent=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=mcrm
spring.datasource.password=mcrm

# Hibernate — quiet in tests
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Liquibase — DROP ALL + re-run every time the test backend starts
# This guarantees a perfectly clean, fully-seeded database for every test run
spring.liquibase.drop-first=true
spring.liquibase.enabled=true

# Server — separate port so dev (8200) and test (8201) can run side by side
server.port=8201
server.servlet.context-path=/api

# CORS — allow the same frontend origins as dev
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3002,http://localhost:3000}
