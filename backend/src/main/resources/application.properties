# Application
spring.application.name=mosque-crm-backend

# DataSource
spring.datasource.url=jdbc:mariadb://localhost:3307/mcrm?createDatabaseIfNotExist=true&useSSL=false&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&nullCatalogMeansCurrent=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=mcrm
spring.datasource.password=mcrm

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
# CRITICAL: Must be true — TenantInterceptor depends on EntityManager being
# available throughout the request lifecycle to enable the organizationFilter.
spring.jpa.open-in-view=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# FreeMarker
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.freemarker.charset=UTF-8
spring.freemarker.cache=false

# Spring Security (default user)
spring.security.user.name=admin
spring.security.user.password=admin123

# Server
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
# CRITICAL: In production, set JWT_SECRET environment variable to a cryptographically random 256-bit string
# Generate with: openssl rand -base64 32
# DO NOT commit production secrets to source control!
jwt.secret=${JWT_SECRET:mosque-crm-dev-secret-CHANGE-THIS-IN-PRODUCTION-use-openssl-rand-base64-32-to-generate}
# Token expiration: 86400000ms = 24 hours
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
# Production: Set to your actual frontend domain (e.g., https://app.mosque.com)
# Development: http://localhost:3000
# Multiple origins: comma-separated list
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3002,http://localhost:3000,http://localhost:19006}

# MinIO / S3-compatible Object Storage
storage.s3.endpoint=${STORAGE_S3_ENDPOINT:http://localhost:9000}
storage.s3.access-key=${STORAGE_S3_ACCESS_KEY:minioadmin}
storage.s3.secret-key=${STORAGE_S3_SECRET_KEY:minioadmin}
storage.s3.bucket=${STORAGE_S3_BUCKET:mosque-crm}
storage.s3.region=${STORAGE_S3_REGION:us-east-1}

# Profile image constraints
storage.profile-image.max-size-mb=${STORAGE_PROFILE_IMAGE_MAX_SIZE_MB:5}
storage.profile-image.allowed-types=image/jpeg,image/png,image/webp,image/gif
