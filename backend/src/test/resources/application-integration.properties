# Integration test profile — connects to the real dev MariaDB.
# Liquibase is disabled so schema migrations do not re-run.
# All test data is created and torn down programmatically in TestTenantFixture.

spring.datasource.url=jdbc:mariadb://localhost:3307/mcrm?createDatabaseIfNotExist=true&useSSL=false&nullCatalogMeansCurrent=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=mcrm
spring.datasource.password=mcrm

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=true

spring.liquibase.enabled=false

# Disable email sending in tests
spring.mail.host=
spring.mail.username=
spring.mail.password=

# Storage: point nowhere — tests create only document metadata rows, no actual file I/O
storage.s3.endpoint=http://localhost:9999
storage.s3.access-key=test
storage.s3.secret-key=test
storage.s3.bucket=test-bucket
storage.s3.region=us-east-1

jwt.secret=integration-test-secret-do-not-use-in-production-only-for-local-it
jwt.expiration=3600000
