services:
  db:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: mcrm
      MARIADB_USER: mcrm
      MARIADB_PASSWORD: mcrm
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      # Creates mcrm-test database on first boot (see docker/init-db.sql)
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/mcrm?createDatabaseIfNotExist=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: mcrm
      SPRING_DATASOURCE_PASSWORD: mcrm
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-mosque-crm}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
    depends_on:
      - db
      - minio

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080/api
    depends_on:
      - backend

volumes:
  db-data:
  minio-data:
