name: memberflow
description: MemberFlow - Mosque Member Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0

  # Routing
  go_router: ^13.0.0

  # Secure storage (JWT on mobile)
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.66.0

  # UI helpers
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/images/
